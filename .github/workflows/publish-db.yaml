# vunnel/.github/workflows/publish-db.yaml
#
# Two-job matrix pipeline:
#   1. `pull` — one job per vunnel provider, running in parallel. Each job
#      fetches its provider's data and uploads it as an artifact. Independent
#      6-hour budget per provider, independent cache per provider, independent
#      failure surface.
#   2. `build` — waits for all `pull` matrix jobs to succeed, downloads every
#      artifact, reassembles the vunnel-data tree, builds grype-db linked
#      against rfJanit/grype fork, packages the DB, publishes to the v6
#      release on rfJanit/grype-db-rf, prunes old archives.
#
# Wall-clock is roughly max(slowest provider) + build/publish, typically
# 45-90 min instead of the 5-6h a sequential run would take.

name: Publish RapidFort Grype DB

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: read

# TEMPORARILY DISABLED for parallel manual-dispatch testing.
# Restore this block before shipping — otherwise two overlapping runs
# can race at the publish stage (both call `gh release upload --clobber`
# on the same `latest.json`, which can HTTP-422 despite the flag).
#
# Restore with:
#
# concurrency:
#   group: publish-db
#   cancel-in-progress: false
#
# Or the group-per-trigger variant that lets dispatch bypass cron queue:
#
# concurrency:
#   group: publish-db-${{ github.event_name }}
#   cancel-in-progress: false

jobs:
  pull:
    name: pull (${{ matrix.provider }})
    runs-on: ubuntu-latest
    strategy:
      # CRITICAL: without fail-fast: false, one provider crashing cancels
      # every sibling matrix job — including any that had already spent
      # 30-60 minutes pulling successfully.
      fail-fast: false
      matrix:
        provider:
          - alpine
          - amazon
          - chainguard
          - debian
          - mariner
          - nvd
          - oracle
          - rhel
          - sles
          - ubuntu
          - wolfi
          - rapidfort
    steps:
      - uses: actions/checkout@v4
        with:
          repository: rfJanit/vunnel
          path: vunnel

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install vunnel into venv at known location
        working-directory: vunnel
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e .

      - name: Locate vunnel binary and add to PATH for subsequent steps
        run: |
          vunnel_bin="$(find "$GITHUB_WORKSPACE" -type f -name vunnel -executable 2>/dev/null | head -1)"
          if [ -z "$vunnel_bin" ]; then
            echo "FAIL — vunnel binary not found under $GITHUB_WORKSPACE" >&2
            find "$GITHUB_WORKSPACE" -name ".venv" -type d 2>/dev/null >&2
            exit 1
          fi
          echo "Found vunnel at: $vunnel_bin"
          dirname "$vunnel_bin" >> "$GITHUB_PATH"

      - name: Sanity check — vunnel resolves on PATH
        run: |
          which vunnel
          vunnel --version

      - name: Sanity check — NVD_API_KEY is present
        # Only meaningful for the nvd matrix job, but running it always is
        # harmless for the others (they don't use the key) and keeps the
        # workflow uniform. If NVD ever runs without a key, its job hits
        # the 6-hour cap while every other matrix job finishes cleanly —
        # so a targeted check on the nvd job would be equivalent.
        if: matrix.provider == 'nvd'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "FAIL — NVD_API_KEY secret is not set on this repo." >&2
            echo "Fix: gh secret set NVD_API_KEY --repo rfJanit/vunnel" >&2
            exit 1
          fi
          echo "OK — NVD_API_KEY is set (length: ${#NVD_API_KEY} chars)."

      - name: Restore ${{ matrix.provider }} data cache
        id: cache
        # One cache scope per provider so a slow provider (nvd, rhel) doesn't
        # invalidate a fast one's cache when the fast one hasn't changed.
        # Key includes github.run_id so each successful run writes a fresh
        # entry; restore-keys falls back to the newest matching prior entry.
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/data/${{ matrix.provider }}
          key: vunnel-data-${{ matrix.provider }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            vunnel-data-${{ matrix.provider }}-${{ runner.os }}-

      - name: Bootstrap ubuntu cache from tarball (only on cache miss)
        # Ubuntu's `vunnel run` does a full git-history walk on a cold cache,
        # which can take 4+ hours on GitHub's 2-core hosted runner and hit
        # the 6-hour job cap without finishing. To avoid this, we seed the
        # cache from a pre-computed tarball hosted as a release asset on
        # rfJanit/grype-db-rf. See RELEASE-GUIDE-GRYPE.md §1.5 for how to
        # refresh the tarball when it goes stale.
        #
        # `steps.cache.outputs.cache-hit` is 'true' only on an exact key
        # match — restore-keys partial matches also set cache-hit to 'true'
        # in actions/cache@v4 for restoreKeys behavior, so we check the
        # provider dir existence as a belt-and-suspenders signal.
        if: matrix.provider == 'ubuntu' && steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "${{ github.workspace }}/data/ubuntu/input" ]; then
            echo "Cache miss reported but data/ubuntu/input exists — skipping bootstrap."
            exit 0
          fi

          echo "Cache miss for ubuntu — downloading bootstrap tarball…"
          mkdir -p "${{ github.workspace }}/data"

          # Download the bootstrap tarball via `gh` (uses GITHUB_TOKEN, works
          # even if grype-db-rf becomes private later). Falls back to plain
          # curl if you'd rather not use the gh CLI here.
          gh release download bootstrap \
              --repo rfJanit/grype-db-rf \
              --pattern 'ubuntu-bootstrap.tar.zst' \
              --dir /tmp/

          echo "Bootstrap tarball size:"
          ls -lh /tmp/ubuntu-bootstrap.tar.zst

          echo "Extracting into data/…"
          tar --zstd -xf /tmp/ubuntu-bootstrap.tar.zst \
              -C "${{ github.workspace }}/data"

          echo "Post-extraction check:"
          ls -la "${{ github.workspace }}/data/ubuntu/"
          jq '{provider, timestamp, stale}' "${{ github.workspace }}/data/ubuntu/metadata.json"

          # Clean up:
          rm /tmp/ubuntu-bootstrap.tar.zst

      - name: Run vunnel provider ${{ matrix.provider }}
        # vunnel's default root is ./data — the artifact upload below picks
        # up ./data/<provider>/. GITHUB_TOKEN is needed by providers that
        # clone from private repos (rapidfort) or hit the GitHub API
        # (github/GHSA). NVD_API_KEY is only used by the nvd provider but
        # exporting it globally is harmless.
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: vunnel run ${{ matrix.provider }}

      - name: Tar provider data before upload
        # actions/upload-artifact@v4 walks the directory tree recursively in
        # Node.js and blows the call stack when there are ~20k+ files.
        # Ubuntu's ubuntu-cve-tracker workspace hits this hard ("Maximum call
        # stack size exceeded"). Reducing the artifact to a single-file
        # tarball sidesteps the walker entirely and is faster to upload/
        # download too. Also applied uniformly to every matrix cell —
        # NVD and RHEL have similar file-count profiles and would eventually
        # hit the same bug.
        #
        # No compression here — actions/upload-artifact already gzip-compresses
        # on upload (see compression-level in the with: block).
        working-directory: ${{ github.workspace }}/data
        run: |
          tar -cf /tmp/vunnel-data-${{ matrix.provider }}.tar ${{ matrix.provider }}/
          ls -lh /tmp/vunnel-data-${{ matrix.provider }}.tar

      - name: Upload ${{ matrix.provider }} data artifact
        # Retention 1 day is enough — the build job downloads them the same
        # run, and we don't need to keep provider-level artifacts around
        # after the final DB has been published.
        uses: actions/upload-artifact@v4
        with:
          name: vunnel-data-${{ matrix.provider }}
          path: /tmp/vunnel-data-${{ matrix.provider }}.tar
          if-no-files-found: error
          retention-days: 1

  build:
    name: build DB and publish
    needs: [pull]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: rfJanit/grype
          # See CLAUDE.md / RELEASE-GUIDE-GRYPE.md — this branch has the
          # rapidfort-* transformer cases in
          # grype/db/v6/build/transformers/os/transform.go that main lacks.
          ref: feat/add-rapidfort-advisories
          path: grype

      - uses: actions/checkout@v4
        with:
          repository: anchore/grype-db
          ref: main
          path: grype-db

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: grype/go.mod

      - name: Point grype-db's go.mod at rfJanit/grype fork
        # Without this, `go build` pulls upstream anchore/grype which lacks
        # the rapidfort-* transformer cases → RF advisories get silently
        # dropped at build time. See RELEASE-GUIDE-GRYPE.md §0 for details.
        working-directory: grype-db
        run: |
          go mod edit -replace github.com/anchore/grype=../grype
          go mod tidy
          resolved=$(go list -m github.com/anchore/grype)
          echo "grype-db is linked against: $resolved"
          case "$resolved" in
            *"=> ../grype"*) echo "OK — replace directive is active." ;;
            *) echo "FAIL — replace didn't stick; build would produce a broken DB." >&2; exit 1 ;;
          esac

      - name: Build grype-db (linked against ../grype fork)
        working-directory: grype-db
        run: go build -o ../grype-db-bin ./cmd/grype-db

      - name: Confirm RF transformer cases are baked in
        # Belt-and-suspenders: strings-grep the binary for the RF distro
        # namespaces. If any are missing, the build linked against upstream
        # grype despite the replace directive.
        run: |
          expected="rapidfort-ubuntu rapidfort-alpine rapidfort-redhat"
          for ns in $expected; do
            if ! strings ./grype-db-bin | grep -q "$ns"; then
              echo "FAIL — grype-db binary is missing '$ns' transformer case." >&2
              exit 1
            fi
          done
          echo "OK — all expected RF transformer namespaces present in binary."

      - name: Download all provider artifacts
        # Downloads each vunnel-data-<provider> artifact into a subdirectory
        # of /tmp/artifacts named after the artifact.
        uses: actions/download-artifact@v4
        with:
          pattern: vunnel-data-*
          path: /tmp/artifacts

      - name: Extract provider tarballs into /tmp/vunnel-data/
        # Each artifact is now a single-file tarball (see "Tar provider data
        # before upload" in the pull job) — extract each into /tmp/vunnel-data/
        # to reconstitute the tree grype-db expects.
        run: |
          set -euo pipefail
          mkdir -p /tmp/vunnel-data
          for dir in /tmp/artifacts/vunnel-data-*/; do
            provider=$(basename "$dir" | sed 's/^vunnel-data-//')
            tar_file="$dir/vunnel-data-$provider.tar"
            if [ ! -f "$tar_file" ]; then
              echo "FAIL — expected $tar_file not found. Directory contents:" >&2
              ls -la "$dir" >&2
              exit 1
            fi
            echo "Extracting $tar_file → /tmp/vunnel-data/"
            tar -xf "$tar_file" -C /tmp/vunnel-data/
            # Free disk space; runners have ~14 GB and provider tarballs add up.
            rm "$tar_file"
            rmdir "$dir" 2>/dev/null || true
          done
          echo "--- Reassembled tree:"
          ls -la /tmp/vunnel-data/
          echo "--- Each provider's metadata.json timestamp:"
          for md in /tmp/vunnel-data/*/metadata.json; do
            [ -f "$md" ] && jq -r '"\(.provider)\t\(.timestamp)\tstale=\(.stale)"' "$md"
          done

      - name: Write .grype-db.yaml
        # Note: this config has NO `provider.vunnel:` block and NO `configs:`
        # list. Matrix jobs already ran vunnel; this step just tells grype-db
        # where to find the pre-computed data. `dir` (not `directory`) — see
        # RELEASE-GUIDE-GRYPE.md §1.4 config-key trap.
        run: |
          cat > /tmp/grype-db.yaml <<'YAML'
          provider:
            root: /tmp/vunnel-data
          build:
            schema-version: 6
            dir: /tmp/build
          package:
            publish-base-url: https://github.com/rfJanit/grype-db-rf/releases/download
          YAML

      - name: Build DB
        run: ./grype-db-bin -c /tmp/grype-db.yaml build -v

      - name: Package DB
        run: ./grype-db-bin -c /tmp/grype-db.yaml package -v

      - name: Publish assets to grype-db-rf v6 release
        env:
          # Cross-repo PAT stored on this repo. Created per Part 1.2.4 of
          # RELEASE-GUIDE-GRYPE.md — needs `repo` scope on rfJanit/grype-db-rf.
          GH_TOKEN: ${{ secrets.GRYPE_DB_RF_RELEASE_TOKEN }}
          RELEASE_REPO: rfJanit/grype-db-rf
          RELEASE_TAG: v6
        run: |
          set -euo pipefail

          # 1. Upload archive(s) FIRST. Filename embeds a timestamp so `--clobber`
          #    is defensive against restarted runs, not against normal writes.
          for archive in /tmp/build/vulnerability-db_v6.*.tar.zst; do
            echo "Uploading $(basename "$archive")…"
            gh release upload "$RELEASE_TAG" "$archive" --clobber --repo "$RELEASE_REPO"
          done

          # 2. Upload latest.json LAST — this atomically switches clients over.
          #    If the workflow crashes between steps 1 and 2, clients keep
          #    seeing the previous manifest+archive. Never orphan a manifest.
          echo "Uploading latest.json (atomic switch)…"
          gh release upload "$RELEASE_TAG" /tmp/build/latest.json --clobber --repo "$RELEASE_REPO"

          # 3. Sanity: confirm both assets are now attached to the release.
          gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" --json assets \
            | jq -r '.assets[] | "\(.name)\t\(.size)"' | sort

      - name: Prune old archive assets (keep last N)
        env:
          GH_TOKEN: ${{ secrets.GRYPE_DB_RF_RELEASE_TOKEN }}
          RELEASE_REPO: rfJanit/grype-db-rf
          RELEASE_TAG: v6
          KEEP: 3         # archives to retain in addition to the newest
        run: |
          set -euo pipefail

          # List all vulnerability-db_*.tar.zst assets sorted by upload time,
          # oldest first. Anything past the KEEP+1 most-recent is deleted.
          # latest.json is left untouched (only .tar.zst matched by the pattern).
          mapfile -t assets < <(
            gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" --json assets \
              | jq -r '.assets
                       | map(select(.name | test("^vulnerability-db_v6\\..*\\.tar\\.zst$")))
                       | sort_by(.createdAt)
                       | .[].name'
          )

          total=${#assets[@]}
          delete_count=$(( total - KEEP - 1 ))
          if (( delete_count <= 0 )); then
            echo "Only $total archives present; nothing to prune (KEEP+1 = $((KEEP+1)))."
            exit 0
          fi

          echo "Deleting $delete_count old archive assets…"
          for (( i=0; i<delete_count; i++ )); do
            echo "  - ${assets[$i]}"
            gh release delete-asset "$RELEASE_TAG" "${assets[$i]}" --repo "$RELEASE_REPO" --yes
          done
